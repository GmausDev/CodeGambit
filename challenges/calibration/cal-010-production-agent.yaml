id: "cal-010-production-agent"
title: "Build a Production-Grade Research Agent"
description: |
  Build a production-grade research agent using LangGraph that can search the
  web, take notes, and synthesize findings into a structured report. This is
  the most complex calibration challenge.

  Your agent should implement a multi-step research workflow:
  1. Plan: Break the research question into sub-questions
  2. Research: Use tools to gather information for each sub-question
  3. Synthesize: Combine findings into a coherent report
  4. Review: Check the report for completeness and accuracy

  This tests your ability to build complex, stateful LangGraph applications
  with multiple tools, conditional routing, and proper error handling.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "master"
elo_band: 1600
mode: "collaborative"
category: "calibration"
tags: ["langgraph", "agent", "production", "workflow", "tools", "research"]
estimated_minutes: 45

steps:
  - id: "step-1"
    title: "Define State and Tools"
    description: |
      Define a TypedDict state with fields: query (str), sub_questions (list[str]),
      findings (list[str]), report (str), review_passed (bool).
      Create mock tools: web_search and note_taker.
  - id: "step-2"
    title: "Build the Planning Node"
    description: |
      Create a node that takes the research query and breaks it into 3-5
      sub-questions using an LLM. Store them in state["sub_questions"].
  - id: "step-3"
    title: "Build the Research Node"
    description: |
      Create a node that iterates over sub_questions, uses the web_search
      tool for each, and stores findings. Use a ReAct sub-agent or a simple
      tool-calling loop.
  - id: "step-4"
    title: "Build Synthesis and Review Nodes"
    description: |
      Synthesis node: combine all findings into a structured report.
      Review node: check if the report adequately addresses all sub-questions.
      If review fails, route back to research with additional questions.
  - id: "step-5"
    title: "Assemble the Graph"
    description: |
      Connect all nodes with edges. Add conditional edge from review node:
      if review_passed, go to END; otherwise, loop back to research.
      Add a max iteration guard to prevent infinite loops.

