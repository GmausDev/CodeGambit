rubric:
  architecture:
    weight: 0.30
    criteria:
      - "Properly splits documents before indexing (not storing whole docs)"
      - "Creates vector store and retriever as separate, composable components"
      - "RAG prompt clearly separates context from question"
  framework_depth:
    weight: 0.40
    criteria:
      - "Uses RecursiveCharacterTextSplitter with appropriate chunk settings"
      - "Uses FAISS.from_documents() with OpenAIEmbeddings"
      - "Builds retrieval chain with LCEL using RunnablePassthrough for the question"
      - "Formats retrieved documents into a context string"
  complexity_mgmt:
    weight: 0.30
    criteria:
      - "Retriever returns appropriate number of results (k=2)"
      - "Context formatting handles multiple documents cleanly"

socratic_questions:
  - "Why do we split documents into chunks rather than embedding entire documents? What are the trade-offs with chunk size?"
  - "How does the retriever decide which chunks are most relevant to a question?"
  - "What is the role of RunnablePassthrough in the RAG chain, and why is it needed?"
  - "How would you evaluate whether your RAG pipeline is returning good answers? What metrics would you use?"
  - "What would change if you replaced FAISS with a persistent vector store like Chroma?"

