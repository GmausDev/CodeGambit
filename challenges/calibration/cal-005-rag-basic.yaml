id: "cal-005-rag-basic"
title: "Build a Basic RAG Pipeline"
description: |
  Retrieval-Augmented Generation (RAG) is one of the most important patterns in
  LangChain. In this challenge, you will build a complete RAG pipeline that:

  1. Loads a set of text documents
  2. Splits them into chunks using a text splitter
  3. Creates embeddings and stores them in an in-memory vector store
  4. Retrieves relevant chunks for a user question
  5. Passes the retrieved context plus the question to an LLM for answering

  This tests your understanding of the core RAG components: document loaders,
  text splitters, embeddings, vector stores, and retrieval chains.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "advanced"
elo_band: 1200
mode: "socratic"
category: "calibration"
tags: ["rag", "retrieval", "embeddings", "vector-store", "text-splitting"]
estimated_minutes: 25

