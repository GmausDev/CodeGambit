  - name: "Test RAG chain returns an answer"
    code: |
      result = ask("What is LCEL?")
      assert isinstance(result, str), "Must return a string"
      assert len(result) > 10, "Answer should be substantive"

  - name: "Test RAG chain uses retrieval"
    code: |
      # The answer about LCEL should reference pipe operator or runnables
      result = ask("What is LCEL and how does it work?")
      result_lower = result.lower()
      assert "pipe" in result_lower or "runnable" in result_lower or "compose" in result_lower, \
          "Answer should reflect retrieved content about LCEL"

  - name: "Test chain is a proper Runnable"
    code: |
      from langchain_core.runnables import Runnable
      chain = build_rag_chain()
      assert isinstance(chain, Runnable), "build_rag_chain must return a Runnable"

reference_solution: |
  from langchain_openai import ChatOpenAI, OpenAIEmbeddings
  from langchain_core.prompts import ChatPromptTemplate
  from langchain_core.output_parsers import StrOutputParser
  from langchain_core.runnables import RunnablePassthrough
  from langchain_community.vectorstores import FAISS
  from langchain_text_splitters import RecursiveCharacterTextSplitter
  from langchain_core.documents import Document

  DOCUMENTS = [
      Document(page_content="LangChain is a framework for building LLM applications. "
               "It provides abstractions for chains, agents, and retrieval."),
      Document(page_content="LCEL (LangChain Expression Language) uses the pipe operator "
               "to compose runnables. Each runnable transforms input to output."),
      Document(page_content="Vector stores like FAISS and Chroma store document embeddings "
               "for similarity search. They are core to RAG pipelines."),
      Document(page_content="Text splitters break large documents into smaller chunks. "
               "RecursiveCharacterTextSplitter is the most commonly used."),
      Document(page_content="Embeddings convert text into numerical vectors. OpenAI's "
               "text-embedding-ada-002 is widely used for this purpose."),
  ]

  def format_docs(docs):
      return "\n\n".join(doc.page_content for doc in docs)

  def build_rag_chain():
      """Build and return a complete RAG chain."""
      # Split documents
      splitter = RecursiveCharacterTextSplitter(chunk_size=200, chunk_overlap=50)
      splits = splitter.split_documents(DOCUMENTS)

      # Create vector store and retriever
      embeddings = OpenAIEmbeddings()
      vectorstore = FAISS.from_documents(splits, embeddings)
      retriever = vectorstore.as_retriever(search_kwargs={"k": 2})

      # RAG prompt
      prompt = ChatPromptTemplate.from_messages([
          ("system",
           "Answer the question based only on the following context:\n\n{context}\n\n"
           "If the context doesn't contain the answer, say so."),
          ("human", "{question}")
      ])

      model = ChatOpenAI(model="gpt-4o-mini", temperature=0)
      parser = StrOutputParser()

      # Build the RAG chain
      chain = (
          {"context": retriever | format_docs, "question": RunnablePassthrough()}
          | prompt
          | model
          | parser
      )
      return chain

  def ask(question: str) -> str:
      """Ask a question against the document store."""
      chain = build_rag_chain()
      return chain.invoke(question)

constraints:
  - "Must use RecursiveCharacterTextSplitter for document splitting"
  - "Must use FAISS as the vector store"
  - "Must use OpenAIEmbeddings"
  - "Must use LCEL pipe syntax for the full chain"
  - "Must format retrieved documents into a context string"
