id: "cal-001-hello-langchain"
title: "Hello LangChain: Your First Chat Chain"
description: |
  Build your first LangChain application from scratch. You will create a simple
  chain that takes a user's name and a programming language, then generates a
  personalized greeting with a fun fact about that language.

  This challenge tests whether you understand the foundational building blocks:
  - How to construct a `ChatPromptTemplate` with multiple variables
  - How to initialize and configure a chat model
  - How to compose a chain using LCEL pipe syntax
  - How to invoke a chain with a dictionary of inputs

  Your chain should accept `{name}` and `{language}` as template variables.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "beginner"
elo_band: 800
mode: "socratic"
category: "calibration"
tags: ["llm", "chat-model", "prompt-template", "lcel", "basics"]
estimated_minutes: 10

