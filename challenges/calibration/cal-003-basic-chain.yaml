id: "cal-003-basic-chain"
title: "Build a Multi-Step Translation Chain"
description: |
  Build a collaborative multi-step LCEL chain that translates text and then
  summarizes the translation. This challenge tests your ability to compose
  multiple chain steps together.

  You will build a pipeline that:
  1. Takes source text and a target language
  2. Translates the text into the target language
  3. Takes the translation and produces a one-sentence summary in English

  This requires chaining two prompt-model pairs together, using LCEL's
  RunnablePassthrough and RunnableLambda to pipe data between steps.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "intermediate"
elo_band: 1000
mode: "collaborative"
category: "calibration"
tags: ["lcel", "chain-composition", "runnable", "multi-step"]
estimated_minutes: 20

steps:
  - id: "step-1"
    title: "Create the Translation Prompt and Chain"
    description: |
      Create a ChatPromptTemplate that accepts `text` and `target_language`,
      and chain it with a ChatOpenAI model and StrOutputParser.
  - id: "step-2"
    title: "Create the Summary Prompt and Chain"
    description: |
      Create a second ChatPromptTemplate that accepts `translated_text` and
      produces a one-sentence English summary. Chain it with the model and parser.
  - id: "step-3"
    title: "Compose the Full Pipeline"
    description: |
      Use RunnablePassthrough.assign() to pipe the translation output into the
      summary chain. The final pipeline should accept {text, target_language}
      and return a dict with both the translation and the summary.
  - id: "step-4"
    title: "Add Error Handling"
    description: |
      Wrap the chain with .with_fallbacks() or a RunnableLambda that handles
      cases where the input text is empty.

