id: "cal-007-agent-tools"
title: "Build a ReAct Agent with Custom Tools"
description: |
  Build a ReAct agent using LangGraph's `create_react_agent` that can use
  custom tools to answer questions. Your agent will have access to a calculator
  tool and a weather lookup tool.

  This challenge tests your understanding of:
  - Defining tools with the `@tool` decorator and proper docstrings
  - Using `create_react_agent` from LangGraph (not the deprecated AgentExecutor)
  - Invoking the agent with proper message format
  - Understanding how the agent decides which tool to call

  The agent should be able to handle questions that require one or both tools,
  as well as questions that need no tools at all.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "expert"
elo_band: 1400
mode: "collaborative"
category: "calibration"
tags: ["agents", "tools", "react", "langgraph", "create-react-agent"]
estimated_minutes: 25

steps:
  - id: "step-1"
    title: "Define Custom Tools"
    description: |
      Create two tools using the `@tool` decorator:
      1. `calculate` — evaluates a math expression string and returns the result
      2. `get_weather` — takes a city name and returns mock weather data
      Each tool must have a clear docstring (the agent uses it to decide when to call the tool).
  - id: "step-2"
    title: "Create the ReAct Agent"
    description: |
      Use `create_react_agent` from `langgraph.prebuilt` to create an agent
      with your tools and a ChatOpenAI model. This returns a compiled LangGraph
      that implements the ReAct loop.
  - id: "step-3"
    title: "Invoke the Agent"
    description: |
      Write a function that invokes the agent with a user question. The input
      format for LangGraph agents is `{"messages": [("user", question)]}`.
      Extract the final AI response from the output messages.
  - id: "step-4"
    title: "Handle Multi-Tool Queries"
    description: |
      Test that the agent can handle queries requiring multiple tool calls,
      like "What's the weather in Paris and what is 72 * 1.8 + 32?"

