id: "cal-004-output-parser"
title: "Structured Output with Pydantic Parsing"
description: |
  LangChain's output parsers let you extract structured data from LLM responses.
  In this challenge, you will build a chain that analyzes a code snippet and
  returns structured feedback as a Pydantic model.

  You need to:
  1. Define a Pydantic model `CodeReview` with fields for `quality_score` (int 1-10),
     `issues` (list of strings), `suggestions` (list of strings), and `language` (str).
  2. Create a ChatPromptTemplate that instructs the LLM to review code.
  3. Use `PydanticOutputParser` to parse the response into your model.
  4. Include the parser's format instructions in the prompt.

  This tests your understanding of output parsing, prompt engineering with
  format instructions, and Pydantic integration.
