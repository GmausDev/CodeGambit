    code: |
      review = CodeReview(quality_score=7, issues=["unused var"], suggestions=["add types"], language="python")
      assert review.quality_score == 7
      assert review.language == "python"
      assert len(review.issues) == 1

  - name: "Test review_code returns CodeReview instance"
    code: |
      result = review_code("def add(a, b): return a + b")
      assert isinstance(result, CodeReview), "Must return a CodeReview instance"
      assert 1 <= result.quality_score <= 10, "Score must be 1-10"
      assert isinstance(result.issues, list), "Issues must be a list"

  - name: "Test quality_score validation"
    code: |
      import pytest
      with pytest.raises(Exception):
          CodeReview(quality_score=15, issues=[], suggestions=[], language="python")

reference_solution: |
  from langchain_openai import ChatOpenAI
  from langchain_core.prompts import ChatPromptTemplate
  from langchain_core.output_parsers import PydanticOutputParser
  from pydantic import BaseModel, Field
  from typing import List

  class CodeReview(BaseModel):
      quality_score: int = Field(ge=1, le=10, description="Code quality score from 1-10")
      issues: List[str] = Field(description="List of identified issues in the code")
      suggestions: List[str] = Field(description="List of improvement suggestions")
      language: str = Field(description="Programming language of the snippet")

  parser = PydanticOutputParser(pydantic_object=CodeReview)

  prompt = ChatPromptTemplate.from_messages([
      ("system",
       "You are an expert code reviewer. Analyze the given code snippet and "
       "provide structured feedback.\n\n{format_instructions}"),
      ("human", "Review this code:\n\n```\n{code_snippet}\n```")
  ]).partial(format_instructions=parser.get_format_instructions())

  model = ChatOpenAI(model="gpt-4o-mini", temperature=0)

  chain = prompt | model | parser

  def review_code(code_snippet: str) -> CodeReview:
      """Analyze code and return structured review."""
      return chain.invoke({"code_snippet": code_snippet})

constraints:
  - "Must define a Pydantic BaseModel with proper field validation"
  - "Must use PydanticOutputParser from langchain_core"
  - "Must include format_instructions in the prompt"
  - "Must use LCEL pipe syntax"
