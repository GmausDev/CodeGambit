id: "cal-009-langgraph-flow"
title: "Build a LangGraph Workflow with Conditional Routing"
description: |
  Build a LangGraph workflow that classifies incoming customer support messages
  and routes them to specialized handler nodes. This tests your understanding
  of LangGraph's core concepts: state, nodes, edges, and conditional routing.

  Your workflow should:
  1. Accept a customer message
  2. Classify it as "billing", "technical", or "general"
  3. Route to the appropriate handler node based on classification
  4. Generate a specialized response
  5. Return the response along with the classification

  This requires defining a TypedDict state schema, creating node functions,
  and using `add_conditional_edges` for dynamic routing.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "master"
elo_band: 1600
mode: "socratic"
category: "calibration"
tags: ["langgraph", "state-machine", "conditional-routing", "workflow"]
estimated_minutes: 35

