id: "soc-007-callbacks"
title: "LangChain Callbacks and Observability"
description: |
  Build a custom callback handler that tracks LLM usage metrics across a
  chain execution. Your handler should capture:
  - Total tokens used (prompt + completion)
  - Number of LLM calls made
  - Latency per call
  - Chain execution tree (which runnables ran in what order)

  This tests your understanding of LangChain's callback system, the
  BaseCallbackHandler class, and how callbacks propagate through LCEL chains.
  Observability is critical for production LLM applications.
