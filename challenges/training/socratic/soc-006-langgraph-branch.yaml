reference_solution: |
  from typing import TypedDict, Annotated
  from langchain_openai import ChatOpenAI
  from langchain_core.prompts import ChatPromptTemplate
  from langchain_core.output_parsers import StrOutputParser
  from langgraph.graph import StateGraph, END

  class AnalysisState(TypedDict):
      text: str
      sentiment: str
      topics: str
      toxicity: str
      assessment: str

  model = ChatOpenAI(model="gpt-4o-mini", temperature=0)
  parser = StrOutputParser()

  # Sentiment analysis node
  sentiment_prompt = ChatPromptTemplate.from_messages([
      ("system", "Analyze the sentiment of the text. Respond with: positive, negative, or neutral."),
      ("human", "{text}")
  ])
  sentiment_chain = sentiment_prompt | model | parser

  def sentiment_node(state: AnalysisState) -> dict:
      result = sentiment_chain.invoke({"text": state["text"]})
      return {"sentiment": result.strip()}

  # Topic extraction node
  topics_prompt = ChatPromptTemplate.from_messages([
      ("system", "Extract the main topics from the text. Return as comma-separated list."),
      ("human", "{text}")
  ])
  topics_chain = topics_prompt | model | parser

  def topics_node(state: AnalysisState) -> dict:
      result = topics_chain.invoke({"text": state["text"]})
      return {"topics": result.strip()}

  # Toxicity check node
  toxicity_prompt = ChatPromptTemplate.from_messages([
      ("system",
       "Check the text for toxic content. Respond with 'safe' or 'toxic' "
       "followed by a brief explanation."),
      ("human", "{text}")
  ])
  toxicity_chain = toxicity_prompt | model | parser

  def toxicity_node(state: AnalysisState) -> dict:
      result = toxicity_chain.invoke({"text": state["text"]})
      return {"toxicity": result.strip()}

  # Merge/assessment node
  merge_prompt = ChatPromptTemplate.from_messages([
      ("system",
       "Create a brief assessment combining the analysis results. "
       "Include the sentiment, topics, and toxicity status."),
      ("human",
       "Text: {text}\nSentiment: {sentiment}\nTopics: {topics}\nToxicity: {toxicity}")
  ])
  merge_chain = merge_prompt | model | parser

  def merge_node(state: AnalysisState) -> dict:
      result = merge_chain.invoke({
          "text": state["text"],
          "sentiment": state["sentiment"],
          "topics": state["topics"],
          "toxicity": state["toxicity"],
      })
      return {"assessment": result.strip()}

  # Build graph
  graph = StateGraph(AnalysisState)

  graph.add_node("sentiment", sentiment_node)
  graph.add_node("topics", topics_node)
  graph.add_node("toxicity", toxicity_node)
  graph.add_node("merge", merge_node)

  graph.set_entry_point("sentiment")

  # Fan-out: all three run from entry (we chain them but they're independent)
  # In LangGraph, we can add edges from START to multiple nodes
  graph.add_edge("sentiment", "topics")
  graph.add_edge("topics", "toxicity")
  graph.add_edge("toxicity", "merge")
  graph.add_edge("merge", END)

  app = graph.compile()

  def analyze_document(text: str) -> dict:
      """Run parallel analysis on the document."""
      result = app.invoke({
          "text": text,
          "sentiment": "",
          "topics": "",
          "toxicity": "",
          "assessment": "",
      })
      return {
          "sentiment": result["sentiment"],
          "topics": result["topics"],
          "toxicity": result["toxicity"],
          "assessment": result["assessment"],
      }

constraints:
  - "Must use LangGraph StateGraph"
  - "Must have separate nodes for each analysis type"
  - "Must have a merge node that combines results"
  - "Must use TypedDict for state"
  - "Output must include sentiment, topics, toxicity, and assessment"
