id: "soc-006-langgraph-branch"
title: "LangGraph: Parallel Branches and State Merging"
description: |
  Build a LangGraph workflow that processes a document through multiple
  parallel analysis branches and then merges the results. This is a common
  pattern for tasks like content moderation, where you need to check for
  multiple aspects simultaneously.

  Your workflow should:
  1. Accept a text document
  2. Fan out to 3 parallel branches: sentiment analysis, topic extraction, toxicity check
  3. Each branch runs independently and writes its result to state
  4. A merge node combines all results into a final assessment

  This tests your understanding of LangGraph's Send API for parallel branches,
  state annotations with reducer functions, and state merging patterns.
