id: "soc-008-custom-retriever"
title: "Build a Custom Retriever with Reranking"
description: |
  Build a custom retriever that extends LangChain's BaseRetriever and implements
  a two-stage retrieval pipeline: first retrieve candidates with vector search,
  then rerank them using a cross-encoder style LLM-based reranker.

  Your custom retriever should:
  1. Extend BaseRetriever with the _get_relevant_documents method
  2. First stage: retrieve top-k candidates from a FAISS vector store
  3. Second stage: use an LLM to score each candidate's relevance (0-10)
  4. Return documents sorted by reranking score, with scores in metadata

  This tests your understanding of the retriever abstraction, how to extend
  it, and the common pattern of retrieve-then-rerank.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "expert"
elo_band: 1400
mode: "socratic"
category: "training"
tags: ["retriever", "custom", "reranking", "rag", "advanced"]
estimated_minutes: 30

