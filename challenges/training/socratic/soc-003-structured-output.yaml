id: "soc-003-structured-output"
title: "Structured Output with with_structured_output()"
description: |
  LangChain 0.3.x introduced `with_structured_output()` as the preferred way
  to get structured data from LLMs — it's more reliable than PydanticOutputParser
  because it uses function calling under the hood.

  Build a job posting analyzer that extracts structured information from
  unstructured job descriptions. Your system should parse out:
  - Job title, company, location
  - Required skills (list)
  - Experience level (junior/mid/senior/lead)
  - Salary range (if mentioned)
  - Remote policy (remote/hybrid/onsite/unspecified)

  This tests your understanding of `with_structured_output()`, Pydantic models,
  and how to handle optional/missing fields gracefully.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "intermediate"
elo_band: 1000
mode: "socratic"
category: "training"
tags: ["structured-output", "pydantic", "function-calling", "extraction"]
estimated_minutes: 20

