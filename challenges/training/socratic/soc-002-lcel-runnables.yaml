reference_solution: |
  from langchain_openai import ChatOpenAI
  from langchain_core.prompts import ChatPromptTemplate
  from langchain_core.output_parsers import StrOutputParser
  from langchain_core.runnables import (
      RunnableParallel,
      RunnablePassthrough,
      RunnableLambda,
  )

  model = ChatOpenAI(model="gpt-4o-mini", temperature=0.7)
  parser = StrOutputParser()

  # Title chain
  title_prompt = ChatPromptTemplate.from_messages([
      ("system", "You create catchy blog post titles. Return only the title."),
      ("human", "Create a blog title about: {topic}")
  ])
  title_chain = title_prompt | model | parser

  # Tweet chain
  tweet_prompt = ChatPromptTemplate.from_messages([
      ("system", "You write engaging tweets. Keep it under 280 characters. Return only the tweet."),
      ("human", "Write a tweet about: {topic}")
  ])
  tweet_chain = tweet_prompt | model | parser

  # Key points chain
  points_prompt = ChatPromptTemplate.from_messages([
      ("system", "You extract key points. Return exactly 3 bullet points, one per line."),
      ("human", "List 3 key points about: {topic}")
  ])
  points_chain = points_prompt | model | parser

  # Parallel execution
  parallel = RunnableParallel(
      title=title_chain,
      tweet=tweet_chain,
      key_points=points_chain,
  )

  # Format the output
  def format_brief(results: dict) -> dict:
      return {
          "title": results["title"].strip(),
          "tweet": results["tweet"].strip(),
          "key_points": results["key_points"].strip(),
      }

  pipeline = (
      {"topic": RunnablePassthrough()}
      | parallel
      | RunnableLambda(format_brief)
  )

  def generate_content_brief(topic: str) -> dict:
      """Generate a content brief with title, tweet, and key points."""
      return pipeline.invoke(topic)

constraints:
  - "Must use RunnableParallel for concurrent generation"
  - "Must use RunnableLambda for at least one transformation"
  - "Must use LCEL pipe syntax throughout"
  - "Tweet must be 280 characters or fewer"
