id: "soc-002-lcel-runnables"
title: "LCEL Deep Dive: Composing Complex Runnables"
description: |
  Go beyond basic pipe syntax and explore LCEL's full power. Build a content
  generation pipeline that uses RunnableParallel to generate multiple outputs
  simultaneously, RunnableLambda for custom transformations, and
  RunnablePassthrough for data threading.

  Your pipeline should:
  1. Accept a topic string
  2. In parallel: generate a blog title, a tweet, and 3 key points
  3. Merge all results into a structured output
  4. Format the final output as a content brief

  This tests your mastery of LCEL's Runnable primitives and how they compose.
