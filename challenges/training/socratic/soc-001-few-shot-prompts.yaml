id: "soc-001-few-shot-prompts"
title: "Few-Shot Prompting with Example Selectors"
description: |
  Build a few-shot prompting system that dynamically selects the most relevant
  examples based on the user's input. Instead of hardcoding examples, you will
  use LangChain's `SemanticSimilarityExampleSelector` to choose examples that
  are most similar to the current query.

  You will create a sentiment classifier that:
  1. Has a pool of labeled examples (text -> sentiment)
  2. Dynamically selects the 3 most relevant examples for each input
  3. Constructs a few-shot prompt with those examples
  4. Uses the LLM to classify the new text

  This tests your understanding of FewShotChatMessagePromptTemplate,
  example selectors, and how to integrate them into an LCEL chain.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "intermediate"
elo_band: 1000
mode: "socratic"
category: "training"
tags: ["few-shot", "prompts", "example-selector", "embeddings"]
estimated_minutes: 20

