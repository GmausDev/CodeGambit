socratic_questions:
  - "Why use dynamic example selection instead of always showing all examples?"
  - "How does SemanticSimilarityExampleSelector choose which examples to include?"
  - "What are the trade-offs between using more vs. fewer few-shot examples?"
  - "How would you evaluate whether the example selector is choosing good examples?"

test_cases:
  - name: "Test positive sentiment classification"
    code: |
      result = classify_sentiment("This is the most incredible product ever!")
      assert result.strip().lower() in ["positive", "negative", "neutral"]

  - name: "Test negative sentiment classification"
    code: |
      result = classify_sentiment("Absolutely horrible, I want a refund.")
      assert "negative" in result.strip().lower()

  - name: "Test returns valid category"
    code: |
      result = classify_sentiment("It's okay I guess.")
      assert result.strip().lower() in ["positive", "negative", "neutral"]

reference_solution: |
  from langchain_openai import ChatOpenAI, OpenAIEmbeddings
  from langchain_core.prompts import (
      ChatPromptTemplate,
      FewShotChatMessagePromptTemplate,
  )
  from langchain_core.example_selectors import SemanticSimilarityExampleSelector
  from langchain_community.vectorstores import FAISS
  from langchain_core.output_parsers import StrOutputParser

  examples = [
      {"text": "This product is amazing, I love it!", "sentiment": "positive"},
      {"text": "Terrible experience, waste of money.", "sentiment": "negative"},
      {"text": "It works okay, nothing special.", "sentiment": "neutral"},
      {"text": "Best purchase I've ever made!", "sentiment": "positive"},
      {"text": "Broken on arrival, very disappointed.", "sentiment": "negative"},
      {"text": "It's fine, does what it says.", "sentiment": "neutral"},
      {"text": "Exceeded my expectations, truly wonderful.", "sentiment": "positive"},
      {"text": "Would not recommend to anyone.", "sentiment": "negative"},
  ]

  # Dynamic example selector
  example_selector = SemanticSimilarityExampleSelector.from_examples(
      examples,
      OpenAIEmbeddings(),
      FAISS,
      k=3,
      input_keys=["text"],
  )

  # Format each example as a human/ai exchange
  example_prompt = ChatPromptTemplate.from_messages([
      ("human", "{text}"),
      ("ai", "{sentiment}"),
  ])

  few_shot_prompt = FewShotChatMessagePromptTemplate(
      example_selector=example_selector,
      example_prompt=example_prompt,
      input_variables=["text"],
  )

  prompt = ChatPromptTemplate.from_messages([
      ("system",
       "You are a sentiment classifier. Classify text as exactly one of: "
       "positive, negative, or neutral. Respond with only the classification."),
      few_shot_prompt,
      ("human", "{text}"),
  ])

  model = ChatOpenAI(model="gpt-4o-mini", temperature=0)
  chain = prompt | model | StrOutputParser()

  def classify_sentiment(text: str) -> str:
      """Classify the sentiment of the given text."""
      return chain.invoke({"text": text}).strip().lower()

constraints:
  - "Must use SemanticSimilarityExampleSelector, not hardcoded examples"
  - "Must use FewShotChatMessagePromptTemplate"
  - "Must return exactly one of: positive, negative, neutral"
  - "Must use LCEL pipe syntax"
