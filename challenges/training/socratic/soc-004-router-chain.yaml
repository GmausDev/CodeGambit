id: "soc-004-router-chain"
title: "Build a Semantic Router with LCEL"
description: |
  Build a semantic router that directs user queries to specialized chains
  based on the query's intent. Instead of keyword matching, use embeddings
  to determine which specialized chain should handle the query.

  Your router should:
  1. Have 3 specialized chains: code_helper, math_solver, and creative_writer
  2. Use embedding similarity to classify the intent of incoming queries
  3. Route to the appropriate chain
  4. Return the response along with which route was selected

  This tests your understanding of RunnableBranch, embedding-based routing,
  and how to build flexible LCEL pipelines that adapt to input.
