reference_solution: |
  from langchain_openai import ChatOpenAI, OpenAIEmbeddings
  from langchain_core.prompts import ChatPromptTemplate
  from langchain_core.output_parsers import StrOutputParser
  from langchain_core.runnables import RunnableLambda, RunnablePassthrough
  import numpy as np

  model = ChatOpenAI(model="gpt-4o-mini", temperature=0.3)
  parser = StrOutputParser()
  embeddings = OpenAIEmbeddings()

  route_descriptions = {
      "code": "programming, coding, debugging, software development, algorithms",
      "math": "mathematics, calculation, equation, algebra, statistics",
      "creative": "writing, story, poem, creative, imagination",
  }

  # Pre-compute route embeddings
  route_names = list(route_descriptions.keys())
  route_texts = list(route_descriptions.values())
  route_embeddings = embeddings.embed_documents(route_texts)

  # Specialized chains
  code_prompt = ChatPromptTemplate.from_messages([
      ("system", "You are an expert programmer. Provide clear code examples and explanations."),
      ("human", "{query}")
  ])
  code_chain = code_prompt | model | parser

  math_prompt = ChatPromptTemplate.from_messages([
      ("system", "You are a math tutor. Show your work step by step."),
      ("human", "{query}")
  ])
  math_chain = math_prompt | model | parser

  creative_prompt = ChatPromptTemplate.from_messages([
      ("system", "You are a creative writer. Be imaginative and expressive."),
      ("human", "{query}")
  ])
  creative_chain = creative_prompt | model | parser

  chains = {"code": code_chain, "math": math_chain, "creative": creative_chain}

  def classify_route(query: str) -> str:
      """Classify the query using embedding similarity."""
      query_embedding = embeddings.embed_query(query)
      similarities = [
          np.dot(query_embedding, route_emb) / (
              np.linalg.norm(query_embedding) * np.linalg.norm(route_emb)
          )
          for route_emb in route_embeddings
      ]
      best_idx = int(np.argmax(similarities))
      return route_names[best_idx]

  def route_and_respond(query: str) -> dict:
      """Route the query and return {route: str, response: str}."""
      route = classify_route(query)
      chain = chains[route]
      response = chain.invoke({"query": query})
      return {"route": route, "response": response}

constraints:
  - "Must use embedding similarity for routing, not keyword matching"
  - "Must have at least 3 specialized chains"
  - "Must return both the selected route and the response"
  - "Must use LCEL pipe syntax for all chains"
