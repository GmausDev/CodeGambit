  - name: "Test sync streaming yields chunks"
    code: |
      chunks = list(stream_response("Count from 1 to 5"))
      assert len(chunks) > 1, "Should yield multiple chunks"
      full_text = "".join(chunks)
      assert len(full_text) > 5

  - name: "Test async streaming yields chunks"
    code: |
      async def _test():
          chunks = []
          async for chunk in astream_response("Say hello world"):
              chunks.append(chunk)
          assert len(chunks) > 1
      asyncio.run(_test())

  - name: "Test event streaming includes events"
    code: |
      async def _test():
          events = []
          async for event in stream_events("Tell me a joke"):
              events.append(event)
          assert len(events) > 0
          event_types = {e["event"] for e in events}
          assert "on_chat_model_stream" in event_types or "on_chain_stream" in event_types
      asyncio.run(_test())

reference_solution: |
  import asyncio
  from langchain_openai import ChatOpenAI
  from langchain_core.prompts import ChatPromptTemplate
  from langchain_core.output_parsers import StrOutputParser
  from langchain_core.runnables import RunnablePassthrough

  model = ChatOpenAI(model="gpt-4o-mini", temperature=0.7, streaming=True)
  parser = StrOutputParser()

  prompt = ChatPromptTemplate.from_messages([
      ("system", "You are a helpful assistant."),
      ("human", "{query}")
  ])

  chain = prompt | model | parser

  def stream_response(query: str):
      """Generator that yields response chunks."""
      for chunk in chain.stream({"query": query}):
          yield chunk

  async def astream_response(query: str):
      """Async generator that yields response chunks."""
      async for chunk in chain.astream({"query": query}):
          yield chunk

  async def stream_events(query: str):
      """Async generator that yields streaming events with metadata."""
      async for event in chain.astream_events(
          {"query": query},
          version="v2",
      ):
          # Filter for relevant events
          if event["event"] in (
              "on_chat_model_stream",
              "on_chain_start",
              "on_chain_end",
          ):
              yield event

constraints:
  - "Must enable streaming=True on the model"
  - "Must implement both sync (.stream) and async (.astream) patterns"
  - "Must use astream_events with version='v2'"
  - "Must use LCEL pipe syntax"
  - "Generators must yield individual chunks, not the full response"
