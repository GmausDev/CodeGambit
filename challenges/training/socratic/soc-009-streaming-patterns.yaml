id: "soc-009-streaming-patterns"
title: "Streaming Patterns in LCEL"
description: |
  Build a streaming-aware LCEL pipeline that demonstrates different streaming
  patterns. In production, streaming is critical for UX — users should see
  responses as they're generated, not wait for the full response.

  You will implement:
  1. Basic streaming with `.stream()` and `.astream()`
  2. Streaming through a multi-step chain (understanding which steps can stream)
  3. Using `astream_events` to get fine-grained streaming events from nested chains
  4. Properly handling streaming with output parsers

  This tests your understanding of how streaming propagates through LCEL chains
  and which Runnables are "streamable."
