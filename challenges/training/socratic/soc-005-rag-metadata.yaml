id: "soc-005-rag-metadata"
title: "RAG with Metadata Filtering and Self-Query"
description: |
  Build an advanced RAG pipeline that supports metadata filtering. Instead of
  purely semantic search, your retriever should understand queries like
  "Find Python tutorials from 2024" and automatically filter by metadata
  (language=Python, year=2024) while also doing semantic search on the content.

  You will use LangChain's SelfQueryRetriever, which uses an LLM to parse
  natural language queries into structured filters + semantic search queries.

  This tests your understanding of:
  - Document metadata schemas
  - SelfQueryRetriever configuration
  - AttributeInfo for describing filterable fields
  - Combining metadata filters with vector similarity
domain: "langchain"
domain_version: "0.3.x"
difficulty: "advanced"
elo_band: 1200
mode: "socratic"
category: "training"
tags: ["rag", "metadata", "self-query", "filtering", "retriever"]
estimated_minutes: 28

