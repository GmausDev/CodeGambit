id: "col-005-full-production-agent"
title: "Build a Full Production Agent with Checkpointing"
description: |
  Build a production-ready LangGraph agent that implements all the patterns
  needed for a real deployment: tool calling, conversation memory, state
  checkpointing for resumability, streaming output, and error recovery.

  Your agent is a "DevOps Assistant" that can:
  1. Search documentation
  2. Check system status (mock)
  3. Generate runbooks
  4. Maintain conversation context across sessions

  This is the capstone challenge — it combines everything from the training
  program into a single, production-quality application.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "master"
elo_band: 1600
mode: "collaborative"
category: "training"
tags: ["production", "langgraph", "checkpointing", "streaming", "agent"]
estimated_minutes: 50

steps:
  - id: "step-1"
    title: "Define State and Tools"
    description: |
      Define a comprehensive TypedDict state and create three tools:
      - search_docs: searches a mock documentation store
      - check_status: returns mock system health metrics
      - generate_runbook: creates a step-by-step runbook from context
  - id: "step-2"
    title: "Build the Agent with create_react_agent"
    description: |
      Use create_react_agent from langgraph.prebuilt with your tools.
      Add a system prompt that establishes the DevOps assistant persona.
      Set recursion_limit to prevent infinite loops.
  - id: "step-3"
    title: "Add Memory with Checkpointing"
    description: |
      Add MemorySaver as a checkpointer so conversations persist across
      invocations. Use thread_id in config to maintain separate conversations.
      This enables the agent to remember past interactions.
  - id: "step-4"
    title: "Add Streaming Support"
    description: |
      Implement streaming output so the user sees the agent's response as
      it's generated. Use .stream() with proper event handling.
  - id: "step-5"
    title: "Add Error Recovery"
    description: |
      Wrap tool calls with error handling so a failed tool doesn't crash
      the entire agent. Add a fallback response when tools fail.

