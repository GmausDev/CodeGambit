id: "col-003-multi-agent"
title: "Build a Multi-Agent System with LangGraph"
description: |
  Build a multi-agent system using LangGraph where specialized agents
  collaborate to process a complex request. Each agent has its own tools
  and expertise, and a supervisor agent routes tasks to the right specialist.

  Your system should have:
  1. A Supervisor agent that analyzes requests and delegates to specialists
  2. A Research agent with web search capabilities
  3. A Code agent with code generation and execution capabilities
  4. A Writer agent that produces polished final output

  The supervisor orchestrates the workflow: it reads the request, decides which
  agent(s) to invoke, collects their outputs, and decides when the task is complete.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "expert"
elo_band: 1400
mode: "collaborative"
category: "training"
tags: ["multi-agent", "langgraph", "supervisor", "orchestration"]
estimated_minutes: 40

steps:
  - id: "step-1"
    title: "Define Agent State and Supervisor"
    description: |
      Define a TypedDict state with fields: task (str), messages (list),
      next_agent (str), agent_outputs (dict), final_output (str), iteration (int).
      Create the supervisor node that decides which agent to invoke next.
  - id: "step-2"
    title: "Build Specialist Agents"
    description: |
      Create three specialist agent nodes:
      - research_agent: has a web_search tool, gathers information
      - code_agent: has a code_execute tool, writes and tests code
      - writer_agent: takes gathered info and produces polished output
      Each agent should update agent_outputs with its results.
  - id: "step-3"
    title: "Wire the Graph"
    description: |
      Connect all nodes with edges. The supervisor routes to specialists via
      conditional edges. After each specialist completes, control returns to
      the supervisor. The supervisor decides to invoke another agent or finish.
  - id: "step-4"
    title: "Add Safety Guards"
    description: |
      Add a maximum iteration limit (5) to prevent infinite loops.
      Add input validation. Ensure the supervisor eventually terminates.

