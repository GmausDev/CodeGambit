id: "col-002-doc-qa-system"
title: "Build a Document Q&A System with Citations"
description: |
  Build a complete document Q&A system that not only answers questions from
  uploaded documents but also provides source citations for every claim.
  This is a common real-world application of RAG.

  Your system should:
  1. Ingest documents from different formats (text content)
  2. Split, embed, and index them in a vector store
  3. For each question, retrieve relevant chunks
  4. Generate an answer with inline citations [Source: doc_name, chunk_id]
  5. Return the answer along with the source documents used

  Build this incrementally, testing each component.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "advanced"
elo_band: 1200
mode: "collaborative"
category: "training"
tags: ["rag", "qa", "citations", "document-processing"]
estimated_minutes: 35

steps:
  - id: "step-1"
    title: "Document Ingestion and Splitting"
    description: |
      Create a function that takes a list of documents (with name and content),
      splits them using RecursiveCharacterTextSplitter, and preserves metadata
      (source name, chunk index) on each split.
  - id: "step-2"
    title: "Vector Store Indexing"
    description: |
      Create a FAISS vector store from the split documents. Build a function
      that can add new documents to an existing index incrementally.
  - id: "step-3"
    title: "Citation-Aware Retrieval Chain"
    description: |
      Build an LCEL chain that retrieves relevant chunks and formats them with
      source metadata visible to the LLM. The prompt should instruct the model
      to cite sources using [Source: name] format.
  - id: "step-4"
    title: "Answer with Source Tracking"
    description: |
      Build the final answer function that returns both the answer text and
      a list of source documents that were used, including their metadata.

