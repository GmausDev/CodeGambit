id: "col-004-agentic-rag"
title: "Build an Agentic RAG System"
description: |
  Build an agentic RAG system that goes beyond simple retrieve-and-answer.
  Your system should be able to:

  1. Decide whether a question needs retrieval or can be answered directly
  2. Formulate better search queries from ambiguous user questions
  3. Evaluate retrieved documents for relevance and re-query if needed
  4. Synthesize answers from multiple retrieval rounds
  5. Know when to say "I don't know" vs. when to search more

  This is a LangGraph workflow that combines retrieval with agent-like
  decision making — a pattern increasingly used in production RAG systems.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "expert"
elo_band: 1400
mode: "collaborative"
category: "training"
tags: ["rag", "agentic", "langgraph", "self-rag", "adaptive-retrieval"]
estimated_minutes: 40

steps:
  - id: "step-1"
    title: "Build the Knowledge Base"
    description: |
      Create a FAISS vector store from a set of documents about LangChain.
      Include metadata for source tracking. Create a retriever that returns
      top-3 results.
  - id: "step-2"
    title: "Build Decision Nodes"
    description: |
      Create three key nodes:
      - query_analyzer: decides if retrieval is needed and rewrites the query
      - relevance_checker: evaluates if retrieved docs answer the question
      - generator: produces the final answer from context
  - id: "step-3"
    title: "Build the Adaptive RAG Graph"
    description: |
      Wire the nodes into a LangGraph:
      - Start -> query_analyzer
      - If retrieval needed -> retrieve -> relevance_check
      - If relevant -> generate answer
      - If not relevant -> rewrite query -> retrieve again (max 2 retries)
      - If no retrieval needed -> generate directly
  - id: "step-4"
    title: "Add Grounding Checks"
    description: |
      After generation, add a hallucination check node that verifies the
      answer is supported by the retrieved context. If not, regenerate.

