id: "col-001-chatbot-memory"
title: "Build a Chatbot with Persistent Memory"
description: |
  Build a fully-featured chatbot with persistent conversation memory,
  personality customization, and session management. This is a realistic
  task that combines several LangChain concepts into a cohesive application.

  Your chatbot should:
  1. Maintain conversation history per session using RunnableWithMessageHistory
  2. Support system personality via a configurable system prompt
  3. Allow users to start new sessions or continue existing ones
  4. Summarize long conversations to keep context windows manageable
  5. Support exporting and importing conversation history

  Build this incrementally, step by step.
domain: "langchain"
domain_version: "0.3.x"
difficulty: "intermediate"
elo_band: 1000
mode: "collaborative"
category: "training"
tags: ["chatbot", "memory", "session", "production"]
estimated_minutes: 30

steps:
  - id: "step-1"
    title: "Basic Chat with History"
    description: |
      Create a basic chatbot that maintains conversation history. Use
      RunnableWithMessageHistory with an in-memory ChatMessageHistory store.
      The chat function should accept a message and session_id.
  - id: "step-2"
    title: "Configurable System Personality"
    description: |
      Add support for different chatbot personalities. The system prompt should
      be configurable per session — e.g., "pirate", "professor", "comedian".
      Store the personality choice alongside the session history.
  - id: "step-3"
    title: "Session Management"
    description: |
      Add functions to: list all active sessions, delete a session, and get
      the message count for a session. This simulates a real chat application's
      session management needs.
  - id: "step-4"
    title: "History Summarization"
    description: |
      When a conversation exceeds 20 messages, automatically summarize the
      older messages into a single summary message to keep the context window
      small. Preserve the last 10 messages verbatim and summarize the rest.
  - id: "step-5"
    title: "Export/Import"
    description: |
      Add functions to export a session's history as a JSON list of
      {role, content} dicts, and to import a JSON list to restore a session.

